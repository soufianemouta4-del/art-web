<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>داشبورد الطلبات - art-web</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', sans-serif;
      background: #f8f4eb;
      color: #2d2110;
      padding: 15px;
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 {
      text-align: center;
      color: #2d6a4f;
      margin-bottom: 20px;
      font-size: 1.8rem;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 20px;
    }
    .total { font-size: 1.1rem; font-weight: 700; color: #2d6a4f; }

    .refresh-btn, .status-btn {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 1rem;
    }
    .refresh-btn { background: #c9a84c; color: #1a1208; }

    .table-container { overflow-x: auto; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); background: white; }
    table { width: 100%; min-width: 800px; border-collapse: collapse; }
    th, td { padding: 14px 10px; text-align: right; border-bottom: 1px solid #e0d4c0; }
    th { background: #c9a84c; color: #1a1208; position: sticky; top: 0; z-index: 10; }

    tr:hover { background: #fdf8ee; }

    /* أزرار الحالة */
    .status-btn {
      font-size: 0.9rem;
      padding: 8px 14px;
      margin: 0 4px;
    }
    .btn-processing {
      background: #f39c12;
      color: white;
    }
    .btn-delivered {
      background: #27ae60;
      color: white;
    }

    .status-badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 700;
    }
    .status-processing { background: #f39c12; color: white; }
    .status-delivered { background: #27ae60; color: white; }

    /* بطاقات الموبايل */
    .card {
      display: none;
      background: white;
      margin-bottom: 15px;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
    .card-item { margin-bottom: 10px; }
    .card-item strong { display: inline-block; width: 100px; color: #5a4b36; }

    @media (max-width: 768px) {
      table { display: none; }
      .card { display: block; }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 داشبورد الطلبات</h1>

    <div class="header">
      <div class="total" id="total-orders">عدد الطلبات: 0</div>
      <button class="refresh-btn" onclick="loadOrders()">تحديث البيانات 🔄</button>
    </div>

    <!-- الجدول -->
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>التاريخ</th>
            <th>الاسم</th>
            <th>الهاتف</th>
            <th>العنوان</th>
            <th>العرض</th>
            <th>الكتاب</th>
            <th>الحالة</th>
            <th>إجراء</th>
          </tr>
        </thead>
        <tbody id="orders-body"></tbody>
      </table>
    </div>

    <!-- بطاقات للموبايل -->
    <div id="cards-container"></div>

    <div id="no-data" style="text-align:center; padding:60px 20px; color:#777; display:none;">
      لا توجد طلبات مسجلة حتى الآن
    </div>
  </div>

  <script>
/*************  ✨ Codeium Command ⭐  *************/
/**
 * Load all orders from the server and display them in the table and cards.
 * 
 * If there are no orders, it will display a message "لا توجد طلبات مسجلة حتى الآن"
 * 
 * It will also display the total number of orders at the top of the page.
 * 
 * If an error occurs while fetching the data, it will show an alert with the error message.
 */
/******  91cdf6da-10fa-4e80-8d4f-cd4ebf254841  *******/
    async function loadOrders() {
      try {
        const res = await fetch('http://localhost:3000/api/orders');        const orders = await res.json();

        const tbody = document.getElementById('orders-body');
        const cardsContainer = document.getElementById('cards-container');
        const totalEl = document.getElementById('total-orders');
        const noData = document.getElementById('no-data');

        tbody.innerHTML = '';
        cardsContainer.innerHTML = '';

        if (orders.length === 0) {
          noData.style.display = 'block';
          totalEl.textContent = 'عدد الطلبات: 0';
          return;
        }

        noData.style.display = 'none';
        totalEl.textContent = `عدد الطلبات: ${orders.length}`;

        orders.forEach(order => {
          const date = new Date(order.date).toLocaleString('ar-MA', {
            year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
          });

          const hiddenPhone = order.phone;

          const currentStatus = order.status || 'new';
          const statusText = currentStatus === 'delivered' ? 'تم التوصيل' : 
                            currentStatus === 'processing' ? 'قيد الشحن' : 'جديد';

          const statusClass = currentStatus === 'delivered' ? 'status-delivered' : 
                             currentStatus === 'processing' ? 'status-processing' : '';

          // الصف في الجدول
          const row = `
            <tr>
              <td>${date}</td>
              <td><strong>${order.name}</strong></td>
              <td dir="ltr">${hiddenPhone}</td>
              <td>${order.address}</td>
              <td>${order.offer}</td>
              <td>${order.selectedBook || '—'}</td>
              <td><span class="status-badge ${statusClass}">${statusText}</span></td>
              <td>
                <button class="status-btn btn-processing" onclick="updateStatus('${order._id}', 'processing')">قيد الشحن</button>
                <button class="status-btn btn-delivered" onclick="updateStatus('${order._id}', 'delivered')">تم التوصيل</button>
              </td>
            </tr>
          `;
          tbody.innerHTML += row;

          // البطاقة للموبايل
          const card = `
            <div class="card">
              <div class="card-item"><strong>التاريخ:</strong> ${date}</div>
              <div class="card-item"><strong>الاسم:</strong> ${order.name}</div>
              <div class="card-item"><strong>الهاتف:</strong> ${hiddenPhone}</div>
              <div class="card-item"><strong>العنوان:</strong> ${order.address}</div>
              <div class="card-item"><strong>العرض:</strong> ${order.offer}</div>
              <div class="card-item"><strong>الكتاب:</strong> ${order.selectedBook || '—'}</div>
              <div class="card-item"><strong>الحالة:</strong> <span class="status-badge ${statusClass}">${statusText}</span></div>
              <div style="margin-top:12px;">
                <button class="status-btn btn-processing" onclick="updateStatus('${order._id}', 'processing')">قيد الشحن</button>
                <button class="status-btn btn-delivered" onclick="updateStatus('${order._id}', 'delivered')">تم التوصيل</button>
              </div>
            </div>
          `;
          cardsContainer.innerHTML += card;
        });

      } catch (err) {
        console.error(err);
        alert('حدث خطأ أثناء تحميل الطلبات');
      }
    }

    async function updateStatus(orderId, status) {
      if (!confirm(`هل أنت متأكد من تغيير الحالة إلى "${status === 'delivered' ? 'تم التوصيل' : 'قيد الشحن'}"؟`)) {
        return;
      }

      try {
        const res = await fetch(`http://localhost:3000/api/orders/${orderId}/status`, {
                    method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });

        if (res.ok) {
          alert('تم تحديث الحالة بنجاح');
          loadOrders(); // إعادة تحميل الطلبات
        } else {
          alert('فشل في تحديث الحالة');
        }
      } catch (err) {
        console.error(err);
        alert('حدث خطأ في الاتصال');
      }
    }

    window.onload = loadOrders;
  </script>
</body>
</html>
